<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery Tracking App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; }
        .hide { display: none !important; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
        .animate-scan { animation: scan 1.5s ease-in-out infinite; }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

    <!-- Container หลัก: ปรับความกว้างตาม Role -->
    <div id="app-container" class="w-full bg-white overflow-hidden relative flex flex-col transition-all duration-500 h-screen shadow-2xl sm:h-[850px] sm:mt-10 sm:rounded-[2.5rem] max-w-md">
        
        <!-- LOGIN VIEW -->
        <div id="view-login" class="flex flex-col h-full bg-slate-100 items-center justify-center p-6 hide">
            <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="truck" class="text-blue-600 w-10 h-10"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 mb-8">เข้าสู่ระบบ</h1>
                <div class="space-y-4">
                    <button onclick="handleLogin('driver')" class="w-full p-4 border-2 rounded-xl flex items-center gap-4 hover:bg-blue-50">
                        <i data-lucide="scan" class="text-blue-600"></i> พนักงานขับรถ
                    </button>
                    <button onclick="handleLogin('customer')" class="w-full p-4 border-2 rounded-xl flex items-center gap-4 hover:bg-green-50">
                        <i data-lucide="search" class="text-green-600"></i> ลูกค้าตรวจสอบพัสดุ
                    </button>
                    <button onclick="handleLogin('admin')" class="w-full p-4 border-2 rounded-xl flex items-center gap-4 hover:bg-slate-100">
                        <i data-lucide="shield-check" class="text-slate-800"></i> ผู้ดูแลระบบ
                    </button>
                </div>
            </div>
        </div>

        <!-- DRIVER VIEW -->
        <div id="view-driver" class="flex-col h-full bg-slate-50 hide">
            <header class="bg-slate-900 text-white p-4 flex justify-between items-center">
                <h1 class="font-bold">Driver App</h1>
                <button onclick="handleLogout()"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </header>
            <div id="driver-empty-state" class="flex-grow flex flex-col items-center justify-center p-6">
                <button onclick="startScanner()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">เปิดกล้องสแกน QR Code</button>
            </div>
            <div id="driver-scanning-state" class="absolute inset-0 bg-slate-900 z-50 hide p-4">
                <div id="reader" class="h-64 mt-20"></div>
                <button onclick="cancelScan()" class="mt-8 w-full py-4 bg-red-500 text-white rounded-xl font-bold">ยกเลิก</button>
            </div>
            <div id="driver-data-state" class="p-4 flex-grow overflow-y-auto hide">
                <div class="bg-blue-100 p-4 rounded-xl mb-4"><p id="driver-doc-no" class="font-bold text-blue-900"></p></div>
                <div id="driver-stops-list" class="space-y-4"></div>
            </div>
        </div>

        <!-- CUSTOMER VIEW -->
        <div id="view-customer" class="flex-col h-full bg-white hide">
            <header class="bg-blue-900 text-white p-4 flex justify-between items-center">
                <h1 class="font-bold">ติดตามพัสดุ</h1>
                <button onclick="handleLogout()"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </header>
            <main class="p-6">
                <input type="text" id="customer-tracking-input" class="w-full p-4 border-2 rounded-xl mb-4" placeholder="กรอกเลข Invoice">
                <button onclick="searchTracking()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">ตรวจสอบสถานะ</button>
            </main>
        </div>

        <!-- ADMIN VIEW -->
        <div id="view-admin" class="flex-col h-full bg-slate-50 hide w-full">
            <header class="bg-slate-800 text-white p-4 flex justify-between items-center">
                <h1 class="font-bold">Admin Dashboard</h1>
                <button onclick="handleLogout()"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </header>
            <div class="flex-grow flex">
                <div id="admin-map" class="flex-grow bg-slate-200"></div>
                <div class="w-72 bg-white border-l p-4 overflow-y-auto" id="admin-fleet-list"></div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPb09gXXhWwbSpHZk07A53l5Dow2-M5iNcoIsN6wPK4P8hrFxpiLSWjaYYJLvdLFES/exec";
        let currentRole = localStorage.getItem('deliveryAppRole');
        let routeData = JSON.parse(localStorage.getItem('deliveryRouteData')) || null;
        let html5QrCode = null;

        document.addEventListener('DOMContentLoaded', () => {
            updateAppView();
        });

        function handleLogin(role) {
            currentRole = role;
            localStorage.setItem('deliveryAppRole', role);
            updateAppView();
        }

        function handleLogout() {
            currentRole = null;
            localStorage.removeItem('deliveryAppRole');
            updateAppView();
        }

        function updateAppView() {
            document.getElementById('view-login').classList.add('hide');
            document.getElementById('view-driver').classList.add('hide');
            document.getElementById('view-customer').classList.add('hide');
            document.getElementById('view-admin').classList.add('hide');
            
            const container = document.getElementById('app-container');
            if(currentRole === 'admin') {
                container.classList.remove('max-w-md'); // ขยายให้กว้างสำหรับ Admin
                document.getElementById('view-admin').classList.remove('hide');
                document.getElementById('view-admin').classList.add('flex');
                initAdminMap();
            } else if (currentRole === 'driver') {
                container.classList.add('max-w-md');
                document.getElementById('view-driver').classList.remove('hide');
                document.getElementById('view-driver').classList.add('flex');
                renderDriverState();
            } else if (currentRole === 'customer') {
                container.classList.add('max-w-md');
                document.getElementById('view-customer').classList.remove('hide');
                document.getElementById('view-customer').classList.add('flex');
            } else {
                document.getElementById('view-login').classList.remove('hide');
            }
            lucide.createIcons();
        }

        // Driver Render
        function renderDriverState() {
            document.getElementById('driver-empty-state').classList.add('hide');
            document.getElementById('driver-data-state').classList.add('hide');
            if (routeData) {
                document.getElementById('driver-doc-no').innerText = "ใบนำส่ง: " + routeData.docNo;
                document.getElementById('driver-data-state').classList.remove('hide');
                const list = document.getElementById('driver-stops-list');
                list.innerHTML = routeData.stops.map((s, i) => `
                    <div class="bg-white p-4 rounded-xl border">
                        <p class="font-bold">${s.customerName}</p>
                        <button onclick="confirmDelivery('${s.customerName}')" class="w-full bg-blue-600 text-white mt-2 py-2 rounded-lg text-sm">ยืนยันส่งมอบ</button>
                    </div>
                `).join('');
            } else {
                document.getElementById('driver-empty-state').classList.remove('hide');
            }
        }

        // Admin Map
        function initAdminMap() {
            const map = L.map('admin-map').setView([13.65, 100.65], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            document.getElementById('admin-fleet-list').innerHTML = "รถทั้งหมด: 3 คัน<br>กำลังวิ่ง: 2 คัน";
        }

        // Camera Logic
        function startScanner() {
            document.getElementById('driver-scanning-state').classList.remove('hide');
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                html5QrCode.stop().then(() => processScanData(text));
            });
        }
        
        function cancelScan() {
            if(html5QrCode) html5QrCode.stop();
            document.getElementById('driver-scanning-state').classList.add('hide');
        }

        async function processScanData(rawText) {
            // Parser Logic เหมือนเดิม...
            const parts = rawText.split('$');
            const data = { docNo: parts[1], origin: parts[0], route: parts[2], stops: [] };
            for(let i=3; i<parts.length; i++) {
                if(!/^\d+$/.test(parts[i].trim())) data.stops.push({ customerName: parts[i].trim(), invoices: [], status: 'pending' });
            }
            routeData = data;
            localStorage.setItem('deliveryRouteData', JSON.stringify(data));
            renderDriverState();
        }

        async function confirmDelivery(name) {
            const stop = routeData.stops.find(s => s.customerName === name);
            stop.status = 'completed';
            localStorage.setItem('deliveryRouteData', JSON.stringify(routeData));
            renderDriverState();
        }

        async function searchTracking() {
            const input = document.getElementById('customer-tracking-input').value;
            alert("กำลังค้นหาข้อมูล: " + input);
        }
    </script>
</body>
</html>
